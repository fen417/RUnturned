<script>
    // Показать выбранную вкладку
    function showTab(id) {
      // Скрыть все вкладки и убрать класс active у всех кнопок
      document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      
      // Показать выбранную вкладку и добавить класс active к кнопке
      document.getElementById(id).classList.add('active');
      document.querySelector(`.nav-btn[onclick="showTab('${id}')"]`).classList.add('active');
      
      // Скрыть меню на мобильных устройствах после выбора вкладки
      if (window.innerWidth <= 768) {
        document.getElementById('navMenu').classList.remove('active');
      }
    }
    
    // Переключение мобильного меню
    function toggleMenu() {
      document.getElementById('navMenu').classList.toggle('active');
    }
    
    // Функция для получения прямой ссылки на скачивание последнего релиза
    async function getLatestReleaseDownloadUrl() {
      try {
        // Получаем последний релиз
        const response = await fetch('https://api.github.com/repos/fen417/RUnturned/releases/latest');
        const release = await response.json();
        
        // Проверяем, есть ли файлы для скачивания
        if (release.assets && release.assets.length > 0) {
          // Берем первый файл (или можно добавить логику выбора конкретного файла)
          return release.assets[0].browser_download_url;
        } else {
          // Если файлов нет, возвращаем ссылку на страницу релизов
          return release.html_url;
        }
      } catch (error) {
        console.error('Ошибка при получении данных о последнем релизе:', error);
        // В случае ошибки возвращаем ссылку на все релизы
        return 'https://github.com/fen417/RUnturned/releases';
      }
    }
    
    // Функция для получения данных о релизах с GitHub API
    async function fetchGitHubDownloads() {
      const countLoader = document.getElementById('countLoader');
      const downloadCount = document.getElementById('downloadCount');
      
      // Показать лоадер
      countLoader.style.display = 'inline-block';
      downloadCount.textContent = '...';
      
      try {
        // Получаем все релизы
        const response = await fetch('https://api.github.com/repos/fen417/RUnturned/releases');
        const releases = await response.json();
        
        // Суммируем количество загрузок из всех релизов
        let totalDownloads = 0;
        
        for (const release of releases) {
          for (const asset of release.assets) {
            totalDownloads += asset.download_count;
          }
        }
        
        // Обновляем счетчик
        downloadCount.textContent = totalDownloads.toLocaleString();
      } catch (error) {
        downloadCount.textContent = 'Ошибка';
        console.error('Ошибка при загрузке данных с GitHub:', error);
      } finally {
        // Скрыть лоадер
        countLoader.style.display = 'none';
      }
    }
    
    // Функция для скачивания последнего релиза
    async function downloadLatestRelease() {
      const downloadBtn = document.getElementById('downloadBtn');
      const originalText = downloadBtn.innerHTML;
      
      // Изменяем текст кнопки на индикатор загрузки
      downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Подготовка скачивания...';
      downloadBtn.style.pointerEvents = 'none';
      
      try {
        // Получаем URL для скачивания
        const downloadUrl = await getLatestReleaseDownloadUrl();
        
        // Восстанавливаем текст кнопки
        downloadBtn.innerHTML = originalText;
        downloadBtn.style.pointerEvents = 'auto';
        
        // Перенаправляем пользователя на скачивание
        window.location.href = downloadUrl;
      } catch (error) {
        console.error('Ошибка при подготовке скачивания:', error);
        
        // Восстанавливаем текст кнопки в случае ошибки
        downloadBtn.innerHTML = originalText;
        downloadBtn.style.pointerEvents = 'auto';
        
        // Перенаправляем на страницу релизов
        window.location.href = 'https://github.com/fen417/RUnturned/releases/latest';
      }
    }
    
    // Инициализация при загрузке страницы
    window.onload = function() {
      // Загружаем данные о скачиваниях с GitHub
      fetchGitHubDownloads();
      
      // Добавляем обработчик клика на кнопку обновления счетчика
      document.getElementById('refreshCount').addEventListener('click', fetchGitHubDownloads);
      
      // Добавляем обработчик клика на кнопку скачивания
      document.getElementById('downloadBtn').addEventListener('click', function(e) {
        e.preventDefault();
        downloadLatestRelease();
      });
    };
